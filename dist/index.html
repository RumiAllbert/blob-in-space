<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blob / Space</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="An interactive Three.js blob you can shape and light from a minimal control surface.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<!-- partial:index.partial.html -->
<div id="canvas_container"></div>

<div class="vignette" aria-hidden="true"></div>
<div class="grain" aria-hidden="true"></div>

<div class="brand" aria-hidden="true">
    <span class="brand__mark"><span class="brand__dot"></span></span>
    <span class="brand__wordmark">BLOB / SPACE</span>
</div>

<div class="hint" aria-hidden="true">
    <kbd>drag</kbd><span>orbit</span>
    <kbd>scroll</kbd><span>zoom</span>
    <kbd>click</kbd><span>pulse</span>
</div>

<aside class="controls" id="controls" aria-label="Blob controls">
    <button class="controls__toggle" id="controlsToggle" type="button" aria-expanded="true" aria-controls="controlsBody" title="Collapse">
        <span class="controls__toggle-bar"></span>
        <span class="controls__toggle-bar"></span>
        <span class="controls__toggle-bar"></span>
    </button>

    <div class="controls__head">
        <span class="controls__title">TUNE</span>
        <span class="controls__preset" id="activePreset">AURORA</span>
    </div>

    <div class="controls__body" id="controlsBody">

        <section class="group">
            <header class="group__head"><span class="group__label">Shape</span></header>
            <div class="field" data-control="amplitude">
                <label>Amplitude<output>6.0</output></label>
                <input type="range" min="0" max="20" step="0.1" value="6">
            </div>
            <div class="field" data-control="detail">
                <label>Detail<output>1.00</output></label>
                <input type="range" min="0.3" max="3" step="0.01" value="1">
            </div>
            <div class="field" data-control="turbulence">
                <label>Turbulence<output>1.00</output></label>
                <input type="range" min="0" max="3" step="0.01" value="1">
            </div>
            <div class="field" data-control="spin">
                <label>Spin<output>1.0</output></label>
                <input type="range" min="-3" max="3" step="0.1" value="1">
            </div>
        </section>

        <section class="group">
            <header class="group__head"><span class="group__label">Light</span></header>
            <div class="field field--hue" data-control="hue">
                <label>Hue<output>210°</output></label>
                <input type="range" min="0" max="360" step="1" value="210">
            </div>
            <div class="field" data-control="glow">
                <label>Glow<output>0.90</output></label>
                <input type="range" min="0" max="2.5" step="0.01" value="0.9">
            </div>
            <div class="field" data-control="shine">
                <label>Shine<output>42</output></label>
                <input type="range" min="0" max="120" step="1" value="42">
            </div>
        </section>

        <section class="group">
            <header class="group__head"><span class="group__label">Orbit</span></header>
            <div class="toggles">
                <label class="toggle">
                    <input type="checkbox" id="toggleRings" checked>
                    <span class="toggle__track"><span class="toggle__thumb"></span></span>
                    <span class="toggle__text">Rings</span>
                </label>
                <label class="toggle">
                    <input type="checkbox" id="toggleAuto" checked>
                    <span class="toggle__track"><span class="toggle__thumb"></span></span>
                    <span class="toggle__text">Auto orbit</span>
                </label>
            </div>
        </section>

        <div class="actions">
            <button class="btn btn--ghost" id="btnRandom" type="button">
                <span class="btn__icon" aria-hidden="true">↻</span>Randomize
            </button>
            <button class="btn btn--primary" id="btnPulse" type="button">
                <span class="btn__icon" aria-hidden="true">◉</span>Pulse
            </button>
        </div>

        <section class="group group--presets">
            <header class="group__head"><span class="group__label">Presets</span></header>
            <div class="presets" id="presets">
                <button class="preset is-active" data-preset="aurora"  type="button">Aurora</button>
                <button class="preset"           data-preset="ember"   type="button">Ember</button>
                <button class="preset"           data-preset="abyss"   type="button">Abyss</button>
                <button class="preset"           data-preset="bloom"   type="button">Bloom</button>
                <button class="preset"           data-preset="pulse"   type="button">Pulse</button>
            </div>
        </section>

    </div>
</aside>
<!-- partial -->
  <script src='https://cdn.jsdelivr.net/npm/three@0.121.1/build/three.min.js'></script>
  <script src='https://cdn.jsdelivr.net/npm/three@0.121.1/examples/js/controls/OrbitControls.js'></script>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js'></script>
  <script src="./script.js"></script>
</body>
</html>
